name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check go fmt
        run: |
          gofmt -l .
          test -z "$(gofmt -l .)"

      - name: Check go fix
        run: |
          go fix ./...
          git diff --exit-code

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.10.1

      - name: Test
        run: go test ./... -race -count=1
